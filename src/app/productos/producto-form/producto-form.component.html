<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">

      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
          <h5 class="mb-0">
            <i class="bi bi-box-seam me-2"></i>{{ titulo }}
          </h5>
        </div>
        <div class="card-body p-4">
          <form #productoForm="ngForm" (ngSubmit)="guardar()">

            <!-- Nombre -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
              <input type="text" class="form-control"
                     [(ngModel)]="producto.nombre"
                     name="nombre"
                     minlength="2" maxlength="20"
                     required
                     #nombre="ngModel"
                     [class.is-invalid]="nombre.invalid && nombre.touched" />
              <div class="invalid-feedback">El nombre debe tener entre 2 y 20 caracteres.</div>
            </div>

            <!-- Descripción -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Descripción</label>
              <textarea class="form-control" rows="2"
                        [(ngModel)]="producto.descripcion"
                        name="descripcion"
                        maxlength="255">
              </textarea>
            </div>

            <!-- Precio -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Precio <span class="text-danger">*</span></label>
              <div class="input-group">
                <span class="input-group-text">$</span>
                <input type="number" class="form-control"
                       [(ngModel)]="producto.precio"
                       name="precio"
                       min="0" step="0.01"
                       required
                       #precio="ngModel"
                       [class.is-invalid]="precio.invalid && precio.touched" />
                <div class="invalid-feedback">El precio es obligatorio y no puede ser negativo.</div>
              </div>
            </div>

            <!-- Stock -->
            <div class="mb-4">
              <label class="form-label fw-semibold">Stock <span class="text-danger">*</span></label>
              <input type="number" class="form-control"
                     [(ngModel)]="producto.stock"
                     name="stock"
                     min="0"
                     required
                     #stock="ngModel"
                     [class.is-invalid]="stock.invalid && stock.touched" />
              <div class="invalid-feedback">El stock es obligatorio y no puede ser negativo.</div>
            </div>

            <!-- Botones -->
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary flex-grow-1"
                      [disabled]="productoForm.invalid">
                <i class="bi bi-check-lg me-1"></i>Guardar
              </button>
              <button type="button" class="btn btn-outline-secondary"
                      (click)="cancelar()">
                Cancelar
              </button>
            </div>

          </form>
        </div>
      </div>

    </div>
  </div>
</div>
