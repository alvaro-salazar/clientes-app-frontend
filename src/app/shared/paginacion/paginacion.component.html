<div *ngIf="totalPaginas > 1" class="d-flex justify-content-between align-items-center mt-3 flex-wrap gap-2">

  <small class="text-muted">
    Página {{ paginaActual + 1 }} de {{ totalPaginas }}
    &mdash; {{ totalElementos }} registro{{ totalElementos !== 1 ? 's' : '' }} en total
  </small>

  <nav aria-label="Paginación">
    <ul class="pagination pagination-sm mb-0">

      <!-- Anterior -->
      <li class="page-item" [class.disabled]="paginaActual === 0">
        <button class="page-link" (click)="ir(paginaActual - 1)" aria-label="Anterior">
          <span aria-hidden="true">&laquo;</span>
        </button>
      </li>

      <!-- Números de página -->
      <li *ngFor="let p of paginas"
          class="page-item"
          [class.active]="p === paginaActual">
        <button class="page-link" (click)="ir(p)">{{ p + 1 }}</button>
      </li>

      <!-- Siguiente -->
      <li class="page-item" [class.disabled]="paginaActual === totalPaginas - 1">
        <button class="page-link" (click)="ir(paginaActual + 1)" aria-label="Siguiente">
          <span aria-hidden="true">&raquo;</span>
        </button>
      </li>

    </ul>
  </nav>

</div>
