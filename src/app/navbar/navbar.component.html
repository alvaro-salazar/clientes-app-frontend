<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
  <div class="container-fluid">

    <!-- Brand -->
    <a class="navbar-brand fw-bold" routerLink="/clientes">
      <i class="bi bi-shop me-2"></i>MiTienda
    </a>

    <!-- Botón hamburguesa (mobile) -->
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navContent"
      aria-controls="navContent"
      aria-expanded="false"
      aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Links colapsables -->
    <div class="collapse navbar-collapse" id="navContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" routerLink="/clientes" routerLinkActive="active">
            <i class="bi bi-people me-1"></i>Clientes
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/productos" routerLinkActive="active">
            <i class="bi bi-box-seam me-1"></i>Productos
          </a>
        </li>
      </ul>

      <!-- Menú usuario (derecha) -->
      <ul class="navbar-nav ms-auto">
        <ng-container *ngIf="authService.isAuthenticated(); else loginBtn">
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" role="button"
               data-bs-toggle="dropdown" aria-expanded="false">
              <i class="bi bi-person-circle me-1"></i>
              {{ authService.getUsername() }}
              <span *ngIf="authService.isAdmin()"
                    class="badge bg-danger ms-1" style="font-size:10px;">ADMIN</span>
              <span *ngIf="!authService.isAdmin() && authService.isAuthenticated()"
                    class="badge bg-success ms-1" style="font-size:10px;">USER</span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end">
              <li>
                <button class="dropdown-item text-danger" (click)="logout()">
                  <i class="bi bi-box-arrow-right me-1"></i>Salir
                </button>
              </li>
            </ul>
          </li>
        </ng-container>

        <ng-template #loginBtn>
          <li class="nav-item">
            <a class="nav-link" routerLink="/auth/login">
              <i class="bi bi-box-arrow-in-right me-1"></i>Iniciar Sesión
            </a>
          </li>
        </ng-template>
      </ul>
    </div>

  </div>
</nav>
