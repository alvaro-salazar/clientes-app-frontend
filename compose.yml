services:  
  postgres:  
    image: 'postgres:latest'  
    environment:  
      - 'POSTGRES_DB=curso_springboot'  
      - 'POSTGRES_PASSWORD=a1b2c3d4'  
      - 'POSTGRES_USER=devdb'  
    ports:  
      - '5432'  
    networks:  
      - red-backend-app  
  
  cliente-service:
    image: 'alvarosalazar/cliente-service:codelab-06'
    ports:
      - '8080:8080'
    depends_on:
      - postgres
    environment:
      DB_URL: jdbc:postgresql://postgres/curso_springboot
      DB_USERNAME: devdb
      DB_PASSWORD: a1b2c3d4
      JPA_DDL: create-drop
    profiles:
      - app
    networks:
      - red-backend-app

  producto-service:
    image: 'alvarosalazar/producto-service:codelab-01'
    ports:
      - '8082:8080'
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/curso_springboot
      SPRING_DATASOURCE_USERNAME: devdb
      SPRING_DATASOURCE_PASSWORD: a1b2c3d4
      SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
    profiles:
      - app
    networks:
      - red-backend-app

networks:  
  red-backend-app:  
    driver: bridge
