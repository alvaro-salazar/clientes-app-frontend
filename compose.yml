services:
  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=curso_springboot'
      - 'POSTGRES_PASSWORD=a1b2c3d4'
      - 'POSTGRES_USER=devdb'
    ports:
      - '5432'
    networks:
      - red-backend-app

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    ports:
      - '8090:8080'
    depends_on:
      - postgres
    networks:
      - red-backend-app
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q 'UP' <&3"]
      interval: 15s
      timeout: 5s
      retries: 10

  cliente-service:
    image: 'alvarosalazar/cliente-service:codelab-06'
    ports:
      - '8080:8080'
    depends_on:
      - postgres
    environment:
      DB_URL: jdbc:postgresql://postgres/curso_springboot
      DB_USERNAME: devdb
      DB_PASSWORD: a1b2c3d4
      JPA_DDL: create-drop
    profiles:
      - app
    networks:
      - red-backend-app

  cliente-service-keycloak:
    image: 'alvarosalazar/cliente-service:keycloak'
    ports:
      - '8080:8080'
    depends_on:
      - postgres
    environment:
      DB_URL: jdbc:postgresql://postgres/curso_springboot
      DB_USERNAME: devdb
      DB_PASSWORD: a1b2c3d4
      JPA_DDL: create-drop
      # issuer-uri: debe coincidir con el 'iss' del token emitido por Keycloak
      # (el browser siempre accede a Keycloak via localhost)
      KEYCLOAK_ISSUER_URI: http://localhost:8090/realms/curso-springboot
      # jwk-set-uri: la URL que el CONTENEDOR usa para descargar las claves publicas
      # host.docker.internal resuelve al host donde corre Keycloak expuesto en 8090
      KEYCLOAK_JWK_SET_URI: http://host.docker.internal:8090/realms/curso-springboot/protocol/openid-connect/certs
    profiles:
      - keycloak
    networks:
      - red-backend-app

  producto-service:
    image: 'alvarosalazar/producto-service:codelab-01'
    ports:
      - '8082:8080'
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/curso_springboot
      SPRING_DATASOURCE_USERNAME: devdb
      SPRING_DATASOURCE_PASSWORD: a1b2c3d4
      SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
    profiles:
      - app
      - keycloak
    networks:
      - red-backend-app

networks:
  red-backend-app:
    driver: bridge
