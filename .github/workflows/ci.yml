name: CI

on:
  push:
    branches:
      - main
      - 'codelab/**'
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Tests Angular
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar tests
        run: npx ng test --watch=false --browsers=ChromeHeadless
